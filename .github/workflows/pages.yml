name: Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mcp/viewer/**"
      - "mcp/*.ts"
      - "mcp/**/*.ts"
      - "mcp/package*.json"
      - ".agent_memory/packets/**"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build repo graph data
        run: |
          npm ci --prefix mcp
          npm run build --prefix mcp
          node mcp/dist/cli.js refresh --project .
          node mcp/dist/cli.js metrics --project . --json > .agent_memory/metrics.json
          node mcp/dist/cli.js inbox --project . --json > .agent_memory/inbox.json
          node mcp/dist/cli.js benchmark --trust --project . --json > .agent_memory/reports/trust.json || true
          node mcp/dist/cli.js suppressed --project . --json > .agent_memory/reports/suppressed.json || true
          node mcp/dist/cli.js lifecycle --project . --json > .agent_memory/reports/lifecycle.json || true
          node mcp/dist/cli.js activity --project . --json > .agent_memory/reports/activity.json || true
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Mirror viewer source to docs
        run: |
          rm -rf docs/viewer
          mkdir -p docs/viewer
          cp -R mcp/viewer/. docs/viewer/
      - name: Verify viewer mirror
        run: diff -qr mcp/viewer docs/viewer
      - name: Add generated graph data to hosted viewer
        run: |
          mkdir -p docs/viewer/data/kage/code_graph
          mkdir -p docs/viewer/data/kage/structural
          mkdir -p docs/viewer/data/kage/reports
          cp .agent_memory/graph/graph.json docs/viewer/data/kage/graph.json
          cp .agent_memory/graph/entities.json docs/viewer/data/kage/entities.json
          cp .agent_memory/graph/edges.json docs/viewer/data/kage/edges.json
          cp .agent_memory/graph/episodes.json docs/viewer/data/kage/episodes.json
          cp .agent_memory/code_graph/graph.json docs/viewer/data/kage/code_graph/graph.json
          cp .agent_memory/structural/files.json docs/viewer/data/kage/structural/files.json
          cp .agent_memory/structural/symbols.json docs/viewer/data/kage/structural/symbols.json
          cp .agent_memory/structural/imports.json docs/viewer/data/kage/structural/imports.json
          cp .agent_memory/metrics.json docs/viewer/data/kage/metrics.json
          cp .agent_memory/inbox.json docs/viewer/data/kage/inbox.json
          # Optional reports the hosted viewer fetches if present.
          for report in risk contributors decisions module-health graph-insights workspace quality benchmark trust suppressed lifecycle activity; do
            if [ -f ".agent_memory/reports/${report}.json" ]; then
              cp ".agent_memory/reports/${report}.json" "docs/viewer/data/kage/reports/${report}.json"
            fi
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
