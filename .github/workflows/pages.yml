name: Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mcp/viewer/**"
      - "mcp/src/**"
      - "mcp/package*.json"
      - ".agent_memory/packets/**"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build repo graph data
        run: |
          npm ci --prefix mcp
          npm run build --prefix mcp
          node mcp/dist/cli.js refresh --project .
          node mcp/dist/cli.js metrics --project . --json > .agent_memory/metrics.json
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Add static viewer
        run: |
          rm -rf docs/viewer
          mkdir -p docs/viewer
          cp -R mcp/viewer/. docs/viewer/
          mkdir -p docs/viewer/data/kage/code_graph
          mkdir -p docs/viewer/data/kage/structural
          cp .agent_memory/graph/graph.json docs/viewer/data/kage/graph.json
          cp .agent_memory/graph/entities.json docs/viewer/data/kage/entities.json
          cp .agent_memory/graph/edges.json docs/viewer/data/kage/edges.json
          cp .agent_memory/graph/episodes.json docs/viewer/data/kage/episodes.json
          cp .agent_memory/code_graph/graph.json docs/viewer/data/kage/code_graph/graph.json
          cp .agent_memory/structural/files.json docs/viewer/data/kage/structural/files.json
          cp .agent_memory/structural/symbols.json docs/viewer/data/kage/structural/symbols.json
          cp .agent_memory/structural/imports.json docs/viewer/data/kage/structural/imports.json
          cp .agent_memory/metrics.json docs/viewer/data/kage/metrics.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
