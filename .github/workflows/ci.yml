name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  mcp:
    name: MCP build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install
        working-directory: mcp
        run: npm ci

      - name: Test
        working-directory: mcp
        run: npm test

      - name: Generate Kage code index
        run: node mcp/dist/cli.js code-index --project . --json

      - name: Build Kage graph registry manifest
        run: node mcp/dist/cli.js graph-registry --project . --json
