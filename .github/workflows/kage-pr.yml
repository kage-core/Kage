name: Kage PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  kage-check:
    name: Memory & graph health
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Build kage CLI
        working-directory: mcp
        run: npm ci && npm run build

      - name: Generate LSP-compatible code index
        run: node mcp/dist/cli.js code-index --project . --json

      - name: Refresh Kage graphs for PR review
        run: node mcp/dist/cli.js refresh --project . --json

      - name: Build graph registry manifest
        run: node mcp/dist/cli.js graph-registry --project . --json

      - name: Run Kage PR check
        id: kage-pr-check
        run: |
          set +e
          node mcp/dist/cli.js quality --project . --json > /tmp/kage-quality.json
          quality_exit=$?
          node mcp/dist/cli.js pr check --project . --json > /tmp/kage-pr-check.json
          pr_exit=$?
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const check = JSON.parse(fs.readFileSync('/tmp/kage-pr-check.json', 'utf8'));
          const quality = JSON.parse(fs.readFileSync('/tmp/kage-quality.json', 'utf8'));
          const escape = (value) => String(value ?? '').replace(/%/g, '%25').replace(/\n/g, '%0A').replace(/\r/g, '%0D');
          console.log(`pr_ok=${check.ok ? 'true' : 'false'}`);
          console.log(`quality_ok=${quality ? 'true' : 'false'}`);
          console.log(`approved=${quality.totals?.approved ?? 0}`);
          console.log(`pending=${quality.totals?.pending ?? 0}`);
          console.log(`stale=${quality.totals?.stale ?? 0}`);
          console.log(`duplicates=${quality.totals?.duplicate ?? 0}`);
          console.log(`useful=${quality.useful_memory_ratio_percent ?? 0}`);
          console.log(`evidence=${quality.evidence_coverage_percent ?? 0}`);
          console.log(`path_grounding=${quality.path_grounding_coverage_percent ?? 0}`);
          console.log(`warnings=${escape((check.warnings ?? []).join('\n'))}`);
          console.log(`errors=${escape((check.errors ?? []).join('\n'))}`);
          console.log(`required_actions=${escape((check.required_actions ?? []).join('\n'))}`);
          NODE
          exit $(( quality_exit != 0 || pr_exit != 0 ))

      - name: Run Kage Minimal Change Guard (advisory)
        id: kage-minimal-change
        run: |
          set +e
          # Advisory by default: the guard participates only when vNext policy is enabled in the repo
          # config. A non-zero exit means an ENFORCED, deterministic rule blocked — surface it, but this
          # step never fails the job by itself (the enforced verdict already flows through `pr check`).
          node mcp/dist/cli.js minimal-change check --project . --base "origin/${{ github.base_ref }}" --json > /tmp/kage-minimal-change.json 2>/dev/null
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const escape = (value) => String(value ?? '').replace(/%/g, '%25').replace(/\n/g, '%0A').replace(/\r/g, '%0D');
          let report = null;
          try { report = JSON.parse(fs.readFileSync('/tmp/kage-minimal-change.json', 'utf8')); } catch {}
          if (!report) {
            console.log('mc_enabled=false');
            console.log('mc_findings=' + escape('The Minimal Change Guard is not enabled for this repository.'));
          } else {
            const lines = (report.findings ?? []).map((f) => {
              const det = f.deterministic ? 'deterministic' : 'advisory (model opinion)';
              const ev = (f.evidence ?? []).map((e) => e.source_uri + (e.symbol ? '#' + e.symbol : '')).slice(0, 3).join(', ');
              const block = (report.blocking ?? []).some((b) => b.finding_id === f.finding_id) ? 'BLOCK' : f.severity;
              return `- [${block}] ${f.kind}: ${f.title} — ${det}${ev ? ' — evidence: ' + ev : ''}`;
            });
            console.log('mc_enabled=true');
            console.log('mc_ok=' + (report.ok ? 'true' : 'false'));
            console.log('mc_mode=' + escape(report.mode ?? 'off'));
            console.log('mc_findings=' + escape(lines.length ? lines.join('\n') : 'No minimal-change findings.'));
          }
          NODE

      - name: Comment Kage PR check summary
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="${{ steps.kage-pr-check.outputs.pr_ok == 'true' && 'Passed' || 'Failed' }}"
          cat > /tmp/kage-pr-comment.md << EOF
          ## Kage PR Check: ${status}

          | Metric | Value |
          | --- | ---: |
          | Approved memory | ${{ steps.kage-pr-check.outputs.approved || '0' }} |
          | Pending memory | ${{ steps.kage-pr-check.outputs.pending || '0' }} |
          | Stale memory | ${{ steps.kage-pr-check.outputs.stale || '0' }} |
          | Duplicate candidates | ${{ steps.kage-pr-check.outputs.duplicates || '0' }} |
          | Useful memory | ${{ steps.kage-pr-check.outputs.useful || '0' }}% |
          | Evidence coverage | ${{ steps.kage-pr-check.outputs.evidence || '0' }}% |
          | Path grounding | ${{ steps.kage-pr-check.outputs.path_grounding || '0' }}% |

          **Required actions**

          ${{ steps.kage-pr-check.outputs.required_actions || 'No required actions reported.' }}

          **Errors**

          ${{ steps.kage-pr-check.outputs.errors || 'None.' }}

          **Warnings**

          ${{ steps.kage-pr-check.outputs.warnings || 'None.' }}

          **Minimal Change Guard** (${{ steps.kage-minimal-change.outputs.mc_mode || 'off' }})

          ${{ steps.kage-minimal-change.outputs.mc_findings || 'The Minimal Change Guard is not enabled for this repository.' }}

          To dismiss an advisory finding, record a justification (actor, reason, commit, expiry) in the
          repository's minimal-change suppressions. Advisory findings never block the merge.
          EOF
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/kage-pr-comment.md
