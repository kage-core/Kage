name: Kage PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  kage-check:
    name: Memory & graph health
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Build kage CLI
        working-directory: mcp
        run: npm ci && npm run build

      - name: Write MCP config for Claude
        run: |
          cat > /tmp/kage-mcp.json << 'EOF'
          {
            "mcpServers": {
              "kage": {
                "type": "stdio",
                "command": "node",
                "args": ["${{ github.workspace }}/mcp/dist/index.js"]
              }
            }
          }
          EOF

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --mcp-config /tmp/kage-mcp.json --max-turns 5
          prompt: |
            You are reviewing a pull request on the Kage repo.

            Run the following kage tools against the project at ${{ github.workspace }}:
            1. mcp__kage__kage_validate with project_dir="${{ github.workspace }}"
            2. mcp__kage__kage_quality with project_dir="${{ github.workspace }}"
            3. mcp__kage__kage_pr_check with project_dir="${{ github.workspace }}"

            Then post a single PR comment summarising:
            - Memory health (approved count, useful %, stale, duplicates)
            - PR check results (pass/fail per check)
            - Any recommended actions (e.g. stale packets to remove, missing memory for changed files)

            Keep it concise. Use a table for the health metrics. Flag blockers clearly.
