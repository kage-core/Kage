name: Kage PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  kage-check:
    name: Memory & graph health
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Build kage CLI
        working-directory: mcp
        run: npm ci && npm run build

      - name: Run kage checks and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          PROJECT=${{ github.workspace }}

          # Run kage checks
          QUALITY=$(node mcp/dist/cli.js quality --project "$PROJECT" --json 2>/dev/null || echo '{}')
          PR_CHECK=$(node mcp/dist/cli.js pr check --project "$PROJECT" --json 2>/dev/null || echo '{}')

          # Parse metrics
          APPROVED=$(echo "$QUALITY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.totals?.approved??0)")
          USEFUL=$(echo "$QUALITY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.useful_memory_ratio_percent??0)")
          STALE=$(echo "$QUALITY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.totals?.stale??0)")
          DUPES=$(echo "$QUALITY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.totals?.duplicate??0)")
          OK=$(echo "$PR_CHECK" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.ok!==false?'✅ Pass':'⚠️ Issues found')")

          # Build comment
          COMMENT="## 🧠 Kage Memory Check

          | Metric | Value |
          |--------|-------|
          | Approved packets | $APPROVED |
          | Useful memory | $USEFUL% |
          | Stale | $STALE |
          | Duplicates | $DUPES |
          | PR check | $OK |"

          if [ "$STALE" -gt 0 ]; then
            COMMENT="$COMMENT

          > ⚠️ **$STALE stale packet(s)** detected — referenced paths no longer exist. Run \`kage quality --project .\` to review."
          fi

          if [ "$DUPES" -gt 0 ]; then
            COMMENT="$COMMENT

          > ⚠️ **$DUPES duplicate packet(s)** — consider merging with \`kage review --project .\`."
          fi

          # Post or update comment
          EXISTING=$(gh api repos/$REPO/issues/$PR_NUMBER/comments \
            --jq '.[] | select(.body | contains("Kage Memory Check")) | .id' 2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api repos/$REPO/issues/comments/$EXISTING \
              -X PATCH -f body="$COMMENT" > /dev/null
          else
            gh pr comment $PR_NUMBER --repo $REPO --body "$COMMENT"
          fi
