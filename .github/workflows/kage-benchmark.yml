name: Kage Benchmark (SWE-bench ablation)

# Manually triggered. Runs the controlled memory ablation from benchmark/ on
# SWE-bench Verified: same fixed agent scaffold, Kage memory on vs off, scored
# by the official SWE-bench harness (Docker). Produces a resolution / tokens /
# time delta table in the job summary and as an artifact.
#
# Requires a repo secret for the chosen provider: OPENAI_API_KEY (default) or
# ANTHROPIC_API_KEY. Keep `limit` small — each task builds a multi-GB Docker
# image and makes live model calls (real API spend).

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Agent model provider"
        required: true
        default: "openai"
        type: choice
        options: [openai, anthropic]
      limit:
        description: "Number of tasks (grouped by repo). Start tiny."
        required: true
        default: "3"
      model:
        description: "Model id (blank = provider default: gpt-4o / claude-sonnet-4-6)"
        required: false
        default: ""

jobs:
  ablation:
    name: Memory ablation pilot
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUN: results/ci
      PROVIDER: ${{ github.event.inputs.provider }}
      MODEL: ${{ github.event.inputs.model }}
      LIMIT: ${{ github.event.inputs.limit }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      KEY_PRESENT: ${{ (github.event.inputs.provider == 'openai' && secrets.OPENAI_API_KEY != '') || (github.event.inputs.provider == 'anthropic' && secrets.ANTHROPIC_API_KEY != '') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          docker image prune -af || true
          df -h

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Build and link kage CLI
        working-directory: mcp
        run: |
          npm ci && npm run build
          npm link            # puts `kage` on PATH for the kage arm
          kage --help | head -1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install benchmark deps
        working-directory: benchmark
        run: pip install -r requirements.txt

      - name: Smoke check (no model, no Docker)
        if: ${{ env.KEY_PRESENT == 'true' }}
        working-directory: benchmark
        run: python smoke.py

      - name: Generate predictions (both arms)
        if: ${{ env.KEY_PRESENT == 'true' }}
        working-directory: benchmark
        run: python run_ablation.py --arm both --limit "${LIMIT}" --out "${RUN}"

      - name: Score control (official harness, Docker)
        if: ${{ env.KEY_PRESENT == 'true' }}
        working-directory: benchmark
        run: bash score.sh control "${RUN}"

      - name: Score kage (official harness, Docker)
        if: ${{ env.KEY_PRESENT == 'true' }}
        working-directory: benchmark
        run: bash score.sh kage "${RUN}"

      - name: Build report
        if: ${{ env.KEY_PRESENT == 'true' }}
        working-directory: benchmark
        run: |
          python report.py "${RUN}"
          {
            echo "## Kage memory ablation — SWE-bench Verified (pilot, limit=${LIMIT})";
            echo;
            cat "${RUN}/report.md";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if no API key
        if: ${{ env.KEY_PRESENT != 'true' }}
        run: |
          echo "::error::Set the ${PROVIDER}_API_KEY repo secret (upper-cased) to run the benchmark." >&2
          exit 1

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kage-ablation-results
          path: |
            benchmark/results/ci/preds_*.jsonl
            benchmark/results/ci/metrics_*.json
            benchmark/results/ci/report.md
          if-no-files-found: ignore
