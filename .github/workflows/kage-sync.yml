name: Kage Sync

on:
  push:
    branches: [master, main]

jobs:
  kage-sync:
    name: Rebuild graphs and capture change memory
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Build kage CLI
        working-directory: mcp
        run: npm ci && npm run build

      - name: Generate LSP-compatible code index
        run: node mcp/dist/cli.js code-index --project . --json

      - name: Refresh indexes, code graph, and knowledge graph
        run: node mcp/dist/cli.js refresh --project . --json

      - name: Build graph registry manifest
        run: node mcp/dist/cli.js graph-registry --project . --json

      - name: Capture change memory from diff
        run: node mcp/dist/cli.js propose --project . --from-diff --json
        continue-on-error: true

      - name: Auto-deprecate stale packets
        run: |
          node -e "
            const { qualityReport } = require('./mcp/dist/kernel.js');
            const { readFileSync, writeFileSync, readdirSync } = require('fs');
            const report = qualityReport('.');
            const stale = report.packets.filter(p => p.classification === 'stale');
            for (const s of stale) {
              const shortId = s.id.split(':').pop();
              const files = readdirSync('.agent_memory/packets').filter(f => f.includes(shortId));
              for (const f of files) {
                const path = \`.agent_memory/packets/\${f}\`;
                const packet = JSON.parse(readFileSync(path, 'utf8'));
                const votes = packet.quality?.votes_up ?? 0;
                if (!votes) {
                  packet.status = 'deprecated';
                  packet.updated_at = new Date().toISOString();
                  writeFileSync(path, JSON.stringify(packet, null, 2));
                  console.log('Deprecated stale packet:', packet.title);
                }
              }
            }
          "
        continue-on-error: true

      - name: Commit updated memory artifacts
        run: |
          git config user.name "kage-bot"
          git config user.email "kage-bot@users.noreply.github.com"
          # Commit + push with race-safe reconciliation. This job runs on EVERY push, so its own push
          # routinely loses the race to a concurrent commit (a `kage learn` memory write, a PR merge).
          # The reconciliation must never delete a packet that concurrent commit added — the old inline
          # version did, silently eating freshly-captured memory. The logic lives in a tested script
          # (scripts/kage-sync-commit.test.mjs reproduces the exact race and asserts survival).
          bash scripts/kage-sync-commit.sh "${GITHUB_REF_NAME}"
