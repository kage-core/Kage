    <text x="990" y="435" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" fill="#16a34a" font-weight="700" letter-spacing="1">DATABASE</text>
