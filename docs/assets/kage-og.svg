  <circle cx="460" cy="280" r="103" fill="none" stroke="#16a34a" stroke-width="0.75" opacity="0.3" />
  <circle cx="460" cy="280" r="96" fill="none" stroke="#16a34a" stroke-width="0.4" opacity="0.15" />

