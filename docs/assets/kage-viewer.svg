    <text x="430" y="412" fill="#ddffe8" font-size="15">Use repo-local packets first.</text>
    <text x="430" y="442" fill="#ddffe8" font-size="15">Cite source files and decisions.</text>
    <text x="430" y="472" fill="#ddffe8" font-size="15">Learn durable fixes back to git.</text>

    <rect x="410" y="522" width="160" height="42" fill="#062b1b" stroke="#20ff86"/>
