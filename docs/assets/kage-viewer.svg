    <rect x="850" y="218" width="104" height="38" fill="#071625" stroke="#41c9ff"/>
    <text x="870" y="242" fill="#41c9ff" font-size="13" font-weight="800">code graph</text>
    <rect x="1032" y="218" width="104" height="38" fill="#1a1005" stroke="#ff9f1c"/>
    <text x="1058" y="242" fill="#ff9f1c" font-size="13" font-weight="800">memory</text>
    <rect x="940" y="298" width="104" height="38" fill="#111326" stroke="#a78bfa"/>
    <text x="956" y="322" fill="#c4b5fd" font-size="13" font-weight="800">team recall</text>

    <rect x="820" y="376" width="336" height="272" fill="url(#panel)" stroke="#26394a"/>
    <text x="838" y="408" fill="#8ea7b5" font-size="14" font-weight="800">REVIEW QUEUE</text>
    <rect x="838" y="424" width="300" height="72" fill="#16110a" stroke="#ff9f1c"/>
    <text x="852" y="448" fill="#ffb15c" font-size="14" font-weight="800">No pending memory.</text>
    <text x="852" y="474" fill="#8ea7b5" font-size="12">repo-local writes are git visible</text>

    <rect x="838" y="526" width="300" height="74" fill="#071018" stroke="#26394a"/>
    <text x="852" y="552" fill="#20ff86" font-size="14" font-weight="800">Codex learns today.</text>
    <text x="852" y="578" fill="#ddffe8" font-size="14">Claude Code recalls tomorrow.</text>
