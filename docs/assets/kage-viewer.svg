<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kage repo hive memory demo" overflow="hidden">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071720"/>
      <stop offset="0.52" stop-color="#03080b"/>
      <stop offset="1" stop-color="#03170d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
