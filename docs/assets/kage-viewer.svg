    <text x="838" y="118" fill="#8ea7b5" font-size="14" font-weight="800">MEMORY + CODE GRAPH</text>
    <g stroke="#26394a" stroke-width="2">
      <path d="M990 176L900 240"/>
      <path d="M990 176L1082 240"/>
      <path d="M900 240L990 300"/>
      <path d="M1082 240L990 300"/>
