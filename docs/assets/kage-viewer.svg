      <text x="58" y="498" fill="#20ff86" font-size="24" font-weight="900">0</text>
      <text x="58" y="520" fill="#8ea7b5" font-size="12">external DB</text>

      <rect x="194" y="464" width="138" height="72" fill="#071018" stroke="#26394a"/>
      <text x="206" y="498" fill="#20ff86" font-size="24" font-weight="900">MCP</text>
