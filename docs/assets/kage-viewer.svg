      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="url(#shell)"/>
  <rect x="24" y="24" width="330" height="644" fill="#071018" stroke="#26394a"/>
  <rect x="372" y="24" width="804" height="644" fill="#071018" stroke="#26394a"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
