    <text x="410" y="206" fill="#41c9ff" font-size="16">✓ Runbook: npm test --prefix mcp</text>
    <text x="410" y="238" fill="#41c9ff" font-size="16">✓ Code graph: 1,898 symbols</text>
    <text x="410" y="270" fill="#41c9ff" font-size="16">✓ Decisions: viewer + memory policy</text>
    <text x="410" y="302" fill="#41c9ff" font-size="16">✓ Context block ready for the agent</text>

