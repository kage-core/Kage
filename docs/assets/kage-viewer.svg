      <text x="92" y="216" fill="#8ea7b5" font-weight="700">Repo graph builds</text>

      <rect x="46" y="242" width="286" height="46" fill="#09141c" stroke="#26394a"/>
      <rect x="56" y="254" width="24" height="24" fill="#101c25" stroke="#304657"/>
      <text x="64" y="272" fill="#8ea7b5">3</text>
      <text x="92" y="272" fill="#8ea7b5" font-weight="700">Memory ships in git</text>

      <rect x="46" y="298" width="286" height="46" fill="#09141c" stroke="#26394a"/>
      <rect x="56" y="310" width="24" height="24" fill="#101c25" stroke="#304657"/>
