<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .bar { fill: #161b22; }
      .t { fill: #c9d1d9; font-size: 14px; }
      .dim { fill: #6e7681; font-size: 14px; }
      .g { fill: #41ff8f; font-size: 14px; }
      .gb { fill: #41ff8f; font-size: 14px; font-weight: 700; }
      .amber { fill: #d29922; font-size: 14px; font-weight: 700; }
      .red { fill: #f85149; font-size: 14px; font-weight: 700; }
      .w { fill: #e6edf3; font-size: 14px; }
    </style>
  </defs>

  <rect class="bg" x="1" y="1" width="818" height="428" rx="12"/>
  <rect x="1" y="1" width="818" height="428" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>
  <rect class="bar" x="1" y="1" width="818" height="38" rx="12"/>
  <rect class="bar" x="1" y="20" width="818" height="19"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="410" y="25" text-anchor="middle" class="dim">kage — verified memory for coding agents</text>

  <text x="24" y="74" class="w"><tspan class="gb">▸</tspan> new session: Kage surfaces what your agent already learned here</text>

  <text x="24" y="108" class="g">✓<tspan class="t" dx="10">Payments must be idempotent</tspan><tspan class="dim" dx="10">cites src/payments.ts</tspan></text>
  <text x="24" y="134" class="g">✓<tspan class="t" dx="10">Auth uses jose, not jsonwebtoken</tspan><tspan class="dim" dx="10">cites src/auth.ts</tspan></text>
  <text x="24" y="160" class="amber">⊘<tspan class="t" dx="10">Legacy retry is the fallback</tspan><tspan class="dim" dx="10">withheld · cited file was deleted</tspan></text>

  <line x1="24" y1="188" x2="796" y2="188" stroke="#21262d" stroke-width="1"/>

  <text x="24" y="216" class="dim">the agent tries to save a memory citing a file that does not exist:</text>
  <text x="24" y="242" class="red">✗<tspan class="t" dx="10">"use the helper in src/ghost.ts"</tspan><tspan class="dim" dx="10">rejected at write time</tspan></text>

  <line x1="24" y1="270" x2="796" y2="270" stroke="#21262d" stroke-width="1"/>

  <text x="24" y="300" class="w">Every memory is cited to real code and re-checked as the code changes,</text>
  <text x="24" y="322" class="w">so <tspan class="gb">stale or hallucinated knowledge never reaches the agent.</tspan></text>

  <text x="24" y="360" class="dim">plain files in your repo · shared with your team through git · no account, no cloud</text>

  <text x="24" y="398" class="t"><tspan class="g">$</tspan> npx -y @kage-core/kage-graph-mcp install</text>
</svg>
