<svg xmlns="http://www.w3.org/2000/svg" width="820" height="468" viewBox="0 0 820 468" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
