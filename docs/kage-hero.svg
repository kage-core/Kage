  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="410" y="25" text-anchor="middle" class="dim">kage — verified memory for coding agents</text>

  <text x="24" y="74"  class="t"><tspan class="g">$</tspan> npx -y @kage-core/kage-graph-mcp scan</text>

  <text x="24" y="106" class="w">Kage Truth Report <tspan class="dim">— your repo</tspan></text>
  <text x="24" y="128" class="dim">Scanned 142 files, 3160 symbols, 1 doc file</text>

  <text x="24" y="160" class="gb">7 knowledge voids<tspan class="dim">  ·  </tspan><tspan class="gb">5 untested hot paths</tspan><tspan class="dim">  ·  </tspan><tspan class="gb">3 complexity hotspots</tspan></text>

  <text x="24" y="200" class="o">■ KNOWLEDGE VOID <tspan class="dim">— high churn, zero memory</tspan></text>
  <text x="40" y="222" class="t">• lib/response.js<tspan class="dim">   churn 27 × 149 deps · 0 memory packets</tspan></text>

