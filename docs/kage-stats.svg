    <text x="1121.5" y="100" text-anchor="middle" font-size="42" font-weight="700" fill="#bc4c00">15</text>
    <text x="1121.5" y="132" text-anchor="middle" font-size="12.5" font-weight="600" letter-spacing="1.2" fill="#57606a">AGENTS</text>
  </g>
</svg>
