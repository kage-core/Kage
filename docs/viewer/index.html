<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kage — memory console</title>
    <style>
      :root {
        --bg: #0a0e0c; --panel: #111714; --line: rgba(220,255,235,0.08);
        --line-strong: rgba(220,255,235,0.16);
        --text: #e7f0ea; --muted: #8a9b91; --faint: #5f6f66;
        --green: #41ff8f; --green-dim: #2bbf6a; --amber: #f5c451; --red: #ff6b6b; --cyan: #6ad7ff;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
      a { color: var(--cyan); text-decoration: none; }
      .shell { max-width: 880px; margin: 0 auto; padding: 0 24px 96px; }

      .topbar { display: flex; align-items: center; gap: 12px; padding: 22px 0 28px; }
      .mark { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
        background: rgba(65,255,143,0.12); border: 1px solid rgba(65,255,143,0.28); color: var(--green);
        font-weight: 800; font-size: 14px; }
      .topbar b { font-weight: 700; letter-spacing: -0.01em; }
      .topbar .repo { color: var(--muted); font-size: 13px; }
      .topbar .spacer { flex: 1; }
      .topbar a.gh { color: var(--muted); font-size: 13px; }

      .hero { border: 1px solid var(--line); border-radius: 16px; padding: 28px 30px;
        background: radial-gradient(120% 140% at 0% 0%, rgba(65,255,143,0.07), transparent 60%), var(--panel);
        display: grid; grid-template-columns: auto 1fr; gap: 36px; align-items: center; }
      .hero[data-status="warn"] { border-color: rgba(245,196,81,0.28); }
      .hero[data-status="alert"] { border-color: rgba(255,107,107,0.30); }
      .hero .eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }
      .hero .score { display: flex; align-items: baseline; gap: 4px; margin-top: 8px; }
      .hero .score b { font-size: 64px; line-height: 0.9; font-weight: 800; letter-spacing: -0.03em; color: var(--green); }
      .hero[data-status="warn"] .score b { color: var(--amber); }
      .hero[data-status="alert"] .score b { color: var(--red); }
      .hero .score span { font-size: 18px; color: var(--faint); }
      .hero .verdict { margin-top: 12px; color: var(--muted); font-size: 13px; max-width: 220px; line-height: 1.5; }
      .bars { display: grid; gap: 16px; }
      .bar { display: grid; grid-template-columns: 1fr auto; gap: 4px 14px; align-items: center; }
      .bar .lbl { font-size: 13.5px; color: var(--text); }
      .bar .val { font-size: 14px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
      .bar .track { grid-column: 1 / 2; height: 6px; border-radius: 99px; background: rgba(255,255,255,0.06); overflow: hidden; }
      .bar .track i { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green-dim), var(--green)); }

      .sec { margin-top: 40px; }
      .sec-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
      .sec-head h2 { margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.02em; }
      .sec-head .count { font-size: 12px; color: var(--faint); }

      .alert-card { border: 1px solid rgba(245,196,81,0.30); border-radius: 14px; overflow: hidden;
        background: linear-gradient(135deg, rgba(28,22,8,0.6), rgba(17,23,20,0.6)); }
      .att { display: grid; grid-template-columns: 1fr auto; gap: 4px 16px; padding: 14px 18px; border-top: 1px solid var(--line); }
      .att:first-child { border-top: none; }
      .att .t { font-size: 14px; font-weight: 600; }
      .att .why { grid-column: 1 / 2; font-size: 12.5px; color: var(--amber); opacity: 0.9; }
      .att .tag { align-self: center; font-size: 11px; color: var(--faint); font-family: var(--mono); }

      .controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
      .controls input { flex: 1; min-width: 200px; background: var(--panel); border: 1px solid var(--line);
        color: var(--text); border-radius: 10px; padding: 11px 14px; font: inherit; font-size: 14px; }
      .controls input::placeholder { color: var(--faint); }
      .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
      .chip { font-size: 12.5px; padding: 8px 12px; border-radius: 99px; border: 1px solid var(--line);
        background: transparent; color: var(--muted); cursor: pointer; font: inherit; }
      .chip[aria-pressed="true"] { border-color: var(--line-strong); background: rgba(255,255,255,0.04); color: var(--text); }
      .chip b { color: var(--faint); font-weight: 600; }

      .row { display: grid; grid-template-columns: 10px 1fr auto; gap: 0 14px; align-items: start;
        padding: 14px 4px; border-top: 1px solid var(--line); }
      .row:first-child { border-top: none; }
      .dot { width: 8px; height: 8px; border-radius: 99px; margin-top: 6px; background: var(--faint); }
      .dot.hot { background: var(--green); box-shadow: 0 0 8px rgba(65,255,143,0.5); }
      .dot.healthy { background: var(--green-dim); }
      .dot.cold { background: #3a4842; }
      .dot.stale, .dot.disputed, .dot.ungrounded { background: var(--amber); }
      .row .body .title { font-size: 14px; font-weight: 600; line-height: 1.35; }
      .row .body .meta { margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .type { font-size: 11px; color: var(--muted); text-transform: lowercase; padding: 2px 7px; border: 1px solid var(--line); border-radius: 6px; }
      .paths { font-family: var(--mono); font-size: 11.5px; color: var(--faint); overflow-wrap: anywhere; }
      .row .right { text-align: right; font-size: 11.5px; color: var(--faint); white-space: nowrap; }
      .health { font-weight: 700; }
      .health.stale, .health.disputed, .health.ungrounded { color: var(--amber); }
      .health.hot, .health.healthy { color: var(--green-dim); }
      .empty { color: var(--faint); padding: 24px 4px; font-size: 14px; }
      .loading { color: var(--muted); padding: 40px 0; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <span class="mark">K</span>
        <b>Kage</b>
        <span class="repo" id="repo">memory console</span>
        <span class="spacer"></span>
        <a class="gh" href="https://github.com/kage-core/Kage">GitHub ↗</a>
      </div>

      <div id="hero" class="hero" data-status="idle">
        <div class="loading">Loading memory…</div>
      </div>

      <section class="sec" id="attentionSec" hidden>
        <div class="sec-head"><h2>Needs your attention</h2><span class="count" id="attentionCount"></span></div>
        <div class="alert-card" id="attention"></div>
      </section>

      <section class="sec">
        <div class="sec-head"><h2>Memory</h2><span class="count" id="memCount"></span></div>
        <div class="controls">
          <input id="search" type="search" placeholder="Search memory by title, file, or type…" />
        </div>
        <div class="chips" id="chips"></div>
        <div id="list"></div>
      </section>
    </div>

    <script src="./console.js?v=1"></script>
  </body>
</html>
